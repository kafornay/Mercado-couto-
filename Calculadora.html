<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora Pro V2</title>
    <style>
        :root {
            --primary: #00ff88;
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --text: #ffffff;
            --accent: #252525;
        }

        * { box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 15px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--card);
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border: 1px solid #333;
        }

        h2 { text-align: center; color: var(--primary); margin-bottom: 25px; font-weight: 800; letter-spacing: -1px; }

        .input-group { margin-bottom: 20px; }

        label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #888; font-weight: 600; text-transform: uppercase; }

        input {
            width: 100%;
            padding: 18px;
            background: var(--accent);
            border: 2px solid transparent;
            border-radius: 16px;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            transition: 0.3s;
            outline: none;
            -webkit-appearance: none;
        }

        input:focus { border-color: var(--primary); background: #2d2d2d; }

        .results {
            margin-top: 30px;
            display: grid;
            gap: 15px;
        }

        .result-card {
            background: #252525;
            padding: 20px;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            border: 1px solid #333;
        }

        .result-label { font-size: 0.75rem; color: #888; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        .result-value { font-size: 1.6rem; font-weight: 800; color: var(--primary); }
        
        .sell-card { background: var(--primary); border: none; }
        .sell-card .result-label { color: rgba(0,0,0,0.5); }
        .sell-card .result-value { color: #000; }

        .symbol { font-size: 1rem; margin-right: 4px; opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <h2>Precificação</h2>

    <div class="input-group">
        <label>Valor Total (NF / Compra)</label>
        <input type="text" id="valorTotal" placeholder="R$ 0,00" inputmode="numeric" oninput="formatarMoeda(this)">
    </div>

    <div class="input-group">
        <label>Quantidade de Itens</label>
        <input type="number" id="quantidade" placeholder="0" inputmode="numeric" oninput="calcular()">
    </div>

    <div class="input-group">
        <label>Margem de Lucro (%)</label>
        <input type="number" id="margem" value="40" inputmode="numeric" oninput="calcular()">
    </div>

    <div class="results">
        <div class="result-card">
            <span class="result-label">Custo por Unidade</span>
            <div class="result-value"><span class="symbol">R$</span><span id="custoUnit">0,00</span></div>
        </div>

        <div class="result-card sell-card">
            <span class="result-label">Sugerido para Venda</span>
            <div class="result-value"><span class="symbol">R$</span><span id="precoVenda">0,00</span></div>
        </div>
    </div>
</div>

<script>
    function formatarMoeda(i) {
        let v = i.value.replace(/\D/g,'');
        v = (v/100).toFixed(2) + '';
        v = v.replace(".", ",");
        v = v.replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,");
        v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");
        i.value = "R$ " + v;
        calcular();
    }

    function converterParaNumero(valorFormatado) {
        return parseFloat(valorFormatado.replace("R$ ", "").replace(/\./g, "").replace(",", ".")) || 0;
    }

    function calcular() {
        const valorTotal = converterParaNumero(document.getElementById('valorTotal').value);
        const quantidade = parseFloat(document.getElementById('quantidade').value) || 0;
        const margem = parseFloat(document.getElementById('margem').value) || 0;

        if (valorTotal > 0 && quantidade > 0) {
            const custoU = valorTotal / quantidade;
            const venda = custoU * (1 + (margem / 100));

            document.getElementById('custoUnit').innerText = custoU.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('precoVenda').innerText = venda.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        } else {
            document.getElementById('custoUnit').innerText = "0,00";
            document.getElementById('precoVenda').innerText = "0,00";
        }
    }
</script>

</body>
</html>
