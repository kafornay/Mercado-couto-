<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COUTO EDIT - ULTRA PRO</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">

    <style>
        :root { --cor-main: #e60000; --cor-detalhe: #ffd400; }
        
        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; background: #080808; color: #fff; 
            display: flex; height: 100vh; overflow: hidden; 
        }

        /* PAINEL DE CONTROLE */
        .painel { 
            width: 360px; padding: 25px; background: #111; border-right: 4px solid var(--cor-main); 
            overflow-y: auto; box-sizing: border-box; 
        }
        h2 { 
            color: var(--cor-detalhe); font-family: 'Archivo Black', sans-serif; text-align: center; 
            margin-bottom: 25px; text-transform: uppercase; letter-spacing: -1px;
        }
        label { display: block; margin-top: 15px; font-size: 11px; color: #777; font-weight: bold; text-transform: uppercase; }
        input, textarea { 
            width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #333; 
            margin-top: 5px; background: #1a1a1a; color: #fff; font-weight: bold; font-size: 14px;
        }
        
        .cores { display: flex; gap: 10px; margin-top: 10px; }
        .cor { width: 38px; height: 38px; border-radius: 6px; cursor: pointer; border: 2px solid #333; transition: 0.3s; }
        .cor.ativa { border-color: #fff; transform: scale(1.1); box-shadow: 0 0 15px var(--cor-main); }

        button { 
            width: 100%; padding: 16px; border: none; border-radius: 6px; margin-top: 15px; 
            font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s; 
        }
        .btn-img { background: var(--cor-detalhe); color: #000; font-size: 16px; }
        .btn-img:hover { background: #fff; transform: translateY(-2px); }

        /* ÁREA DE PREVIEW */
        .preview-area { flex: 1; display: flex; justify-content: center; align-items: center; background: #1e1e1e; padding: 20px; }

        /* O ENCARTE PROFISSIONAL */
        .encarte { 
            width: 450px; height: 640px; background: #fff; position: relative; overflow: hidden; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.7); font-family: 'Archivo Black', sans-serif;
        }

        /* TOPO ESTILO VAREJO */
        .topo { 
            background: var(--cor-main); color: #fff; padding: 25px 10px; text-align: center; 
            position: relative; z-index: 2;
        }
        .topo h1 { 
            margin: 0; font-size: 42px; line-height: 0.8; font-style: italic; 
            text-transform: uppercase; transform: skewX(-10deg); text-shadow: 4px 4px 0px rgba(0,0,0,0.2);
        }
        .faixa-oferta { 
            background: var(--cor-detalhe); color: #000; padding: 5px; font-size: 15px; 
            margin-top: 10px; transform: rotate(-1deg); display: inline-block; width: 100%;
        }

        /* IMAGEM E NOME */
        .produto-box { 
            height: 300px; display: flex; justify-content: center; align-items: center; 
            padding: 20px; position: relative;
        }
        .produto-img { max-width: 90%; max-height: 90%; object-fit: contain; filter: drop-shadow(0 15px 25px rgba(0,0,0,0.15)); }

        .nome-produto { 
            background: #222; color: #fff; text-align: center; padding: 15px; 
            margin: 0 20px; font-size: 26px; line-height: 1; min-height: 60px;
            display: flex; align-items: center; justify-content: center;
            border-bottom: 6px solid var(--cor-detalhe); text-transform: uppercase;
        }

        /* SELO DE PREÇO AGRESSIVO */
        .selo-preco {
            position: absolute; bottom: 45px; right: -5px; width: 240px; height: 240px;
            background: var(--cor-main); color: #fff;
            clip-path: polygon(100% 50%, 94% 63%, 95% 77%, 83% 83%, 77% 95%, 63% 94%, 50% 100%, 37% 94%, 23% 95%, 17% 83%, 5% 77%, 6% 63%, 0% 50%, 6% 37%, 5% 23%, 17% 17%, 23% 5%, 37% 6%, 50% 0%, 63% 6%, 77% 5%, 83% 17%, 95% 23%, 94% 37%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transform: rotate(4deg); box-shadow: 10px 10px 30px rgba(0,0,0,0.4);
            border: 4px solid var(--cor-detalhe);
        }

        .rs-tag { font-size: 30px; color: var(--cor-detalhe); margin-bottom: -15px; margin-left: -70px; }
        .preco-wrapper { display: flex; align-items: flex-start; }
        .valor-inteiro { font-size: 115px; line-height: 0.85; letter-spacing: -10px; }
        .valor-centavos { font-size: 55px; color: var(--cor-detalhe); margin-top: 5px; letter-spacing: -2px; }
        .unidade-tag { 
            font-size: 18px; margin-top: -5px; background: rgba(0,0,0,0.3); 
            padding: 2px 15px; border-radius: 50px; border: 1px solid var(--cor-detalhe);
        }

        .rodape { 
            position: absolute; bottom: 0; width: 100%; background: #000; 
            color: #fff; text-align: center; padding: 12px; font-size: 10px; font-family: Arial; font-weight: normal;
        }
    </style>
</head>
<body>

<div class="painel">
    <h2>COUTO EDIT <span style="color:#fff">PRO</span></h2>

    <label>Imagem (PNG Transparente)</label>
    <input type="file" id="produtoInput">

    <label>Título Chamada</label>
    <input type="text" id="tituloTxt" value="OFERTA IMBATÍVEL">

    <label>Nome do Produto</label>
    <input type="text" id="nome" value="PICANHA BOVINA KG">

    <label>Preço (ex: 59,90)</label>
    <input type="text" id="preco" value="59,90">

    <label>Unidade</label>
    <input type="text" id="unidade" value="QUILO">

    <label>Identidade Visual</label>
    <div class="cores">
        <div class="cor ativa" style="background:#e60000" onclick="mudarCor('#e60000', this)"></div>
        <div class="cor" style="background:#0047ab" onclick="mudarCor('#0047ab', this)"></div>
        <div class="cor" style="background:#008000" onclick="mudarCor('#008000', this)"></div>
        <div class="cor" style="background:#ff6600" onclick="mudarCor('#ff6600', this)"></div>
        <div class="cor" style="background:#6a00a8" onclick="mudarCor('#6a00a8', this)"></div>
    </div>

    <button class="btn-img" onclick="baixarImagem()">BAIXAR ENCARTE EM HD</button>
    <button style="background:#333; color:#fff; font-size:11px" onclick="baixarPDF()">GERAR PDF PARA IMPRESSÃO</button>
</div>

<div class="preview-area">
    <div class="encarte" id="encarte">
        <div class="topo" id="topoCor">
            <h1 id="tituloPreview">OFERTA IMBATÍVEL</h1>
            <div class="faixa-oferta">PREÇO BAIXO DE VERDADE É AQUI!</div>
        </div>

        <div class="produto-box">
            <img src="https://via.placeholder.com/400?text=PRODUTO+PNG" class="produto-img" id="previewImg">
        </div>

        <div class="nome-produto" id="nomePreview">PICANHA BOVINA KG</div>

        <div class="selo-preco" id="seloCor">
            <span class="rs-tag">R$</span>
            <div class="preco-wrapper">
                <span class="valor-inteiro" id="intPart">59</span>
                <span class="valor-centavos" id="centPart">,90</span>
            </div>
            <span class="unidade-tag" id="unPreview">QUILO</span>
        </div>

        <div class="rodape" id="rodapePreview">
            Ofertas válidas enquanto durarem os estoques. Fotos meramente ilustrativas. Preços sujeitos a alteração.
        </div>
    </div>
</div>

<script>
    const precoIn = document.getElementById('preco');
    
    // Separação de preço estilo supermercado
    function atualizarPreco() {
        const valor = precoIn.value.replace('.', ',');
        const partes = valor.split(',');
        document.getElementById('intPart').innerText = partes[0];
        document.getElementById('centPart').innerText = partes[1] ? ',' + partes[1] : ',00';
    }

    // Live Updates
    document.getElementById('tituloTxt').oninput = e => document.getElementById('tituloPreview').innerText = e.target.value.toUpperCase();
    document.getElementById('nome').oninput = e => document.getElementById('nomePreview').innerText = e.target.value.toUpperCase();
    document.getElementById('unidade').oninput = e => document.getElementById('unPreview').innerText = e.target.value.toUpperCase();
    precoIn.oninput = atualizarPreco;

    // Upload de Imagem
    document.getElementById('produtoInput').onchange = e => {
        const reader = new FileReader();
        reader.onload = () => document.getElementById('previewImg').src = reader.result;
        reader.readAsDataURL(e.target.files[0]);
    }

    // Troca de Cor Profissional
    function mudarCor(cor, el) {
        document.documentElement.style.setProperty('--cor-main', cor);
        document.getElementById('topoCor').style.background = cor;
        document.getElementById('seloCor').style.background = cor;
        document.querySelectorAll('.cor').forEach(c => c.classList.remove('ativa'));
        el.classList.add('ativa');
    }

    // Exportação de Alta Qualidade
    function baixarImagem() {
        const encarte = document.getElementById('encarte');
        html2canvas(encarte, { 
            scale: 4, // Aumenta a resolução para impressão
            useCORS: true,
            logging: false
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = `CoutoEdit_Oferta_${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    }

    async function baixarPDF() {
        const { jsPDF } = window.jspdf;
        const canvas = await html2canvas(document.getElementById('encarte'), { scale: 3 });
        const pdf = new jsPDF('p', 'mm', 'a4');
        pdf.addImage(canvas.toDataURL('image/jpeg', 1.0), 'JPEG', 10, 10, 190, 270);
        pdf.save("CoutoEdit_Encarte.pdf");
    }

    atualizarPreco();
</script>

</body>
</html>
