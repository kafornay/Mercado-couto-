<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Editor de Encarte - Mercado</title>

<!-- jsPDF CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#111;
  color:#fff;
  display:flex;
}
.sidebar{
  width:320px;
  background:#1e1e1e;
  padding:20px;
  box-sizing:border-box;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.sidebar input, .sidebar button{
  padding:10px;
  font-size:16px;
}
.sidebar button{
  cursor:pointer;
  border:none;
  font-weight:bold;
}
.main{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}
canvas{
  max-height:90vh;
  box-shadow:0 0 40px rgba(0,0,0,.6);
  background:#fff;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>COUTO EDIT</h2>

<label>Logo</label>
<input type="file" id="logoInput">

<label>Produto</label>
<input type="file" id="productInput">

<label>Nome Produto</label>
<input type="text" id="productName" value="CERVEJA LATA 350ML">

<label>Preço</label>
<input type="text" id="price" value="3,49">

<label>Cor</label>
<input type="color" id="color" value="#e31d1a">

<label>Rodapé</label>
<input type="text" id="footer" value="Oferta válida enquanto durarem os estoques.">

<button style="background:#ffd400" onclick="downloadPNG()">BAIXAR IMAGEM</button>
<button onclick="downloadPDF()">BAIXAR PDF</button>
</div>

<div class="main">
<canvas id="canvas" width="2100" height="2970"></canvas>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let logoImg = null;
let productImg = null;

function loadImage(file, callback){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    const img = new Image();
    img.onload = ()=>callback(img);
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

document.getElementById("logoInput").onchange = e=>{
  loadImage(e.target.files[0], img=>{
    logoImg = img;
    draw();
  });
};

document.getElementById("productInput").onchange = e=>{
  loadImage(e.target.files[0], img=>{
    productImg = img;
    draw();
  });
};

document.querySelectorAll("input").forEach(i=>i.oninput = draw);

function draw(){

const name = document.getElementById("productName").value;
const price = document.getElementById("price").value;
const color = document.getElementById("color").value;
const footer = document.getElementById("footer").value;

ctx.clearRect(0,0,2100,2970);

//// BACKGROUND
ctx.fillStyle="#f3f3f3";
ctx.fillRect(0,0,2100,2970);

//// HEADER
ctx.fillStyle=color;
ctx.fillRect(0,0,2100,420);

ctx.fillStyle="#fff";
ctx.font="bold 120px Arial";
ctx.textAlign="center";
ctx.fillText("OFERTA DA SEMANA",1050,250);

//// LOGO
if(logoImg){
ctx.drawImage(logoImg,60,60,260,260);
}

//// PRODUTO
if(productImg){
ctx.drawImage(productImg,650,520,800,800);
}

//// NOME
ctx.fillStyle="#000";
ctx.font="bold 80px Arial";
ctx.fillText(name.toUpperCase(),1050,1500);

//// PREÇO CÍRCULO
ctx.beginPath();
ctx.arc(1050,2050,300,0,Math.PI*2);
ctx.fillStyle=color;
ctx.fill();

ctx.fillStyle="#fff";
ctx.font="bold 160px Arial";
ctx.fillText("R$ "+price,1050,2100);

//// RODAPÉ
ctx.fillStyle="#333";
ctx.fillRect(0,2800,2100,170);

ctx.fillStyle="#fff";
ctx.font="40px Arial";
ctx.fillText(footer,1050,2900);

}

draw();

function downloadPNG(){
const link=document.createElement("a");
link.download="oferta.png";
link.href=canvas.toDataURL();
link.click();
}

function downloadPDF(){
const { jsPDF } = window.jspdf;
const pdf = new jsPDF("p","mm","a4");
pdf.addImage(canvas.toDataURL("image/jpeg",1.0),"JPEG",0,0,210,297);
pdf.save("oferta.pdf");
}
</script>

</body>
</html>
