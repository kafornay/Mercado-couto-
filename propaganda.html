<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COUTO EDIT PRO - V3 FINAL A4</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">

    <style>
        :root { --cor-main: #e60000; --cor-detalhe: #ffd400; }
        
        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; 
            display: flex; height: 100vh; overflow: hidden; 
        }

        /* PAINEL DE CONTROLE */
        .painel { 
            width: 360px; padding: 25px; background: #151515; border-right: 4px solid var(--cor-main); 
            overflow-y: auto; box-sizing: border-box; 
        }
        h2 { color: var(--cor-detalhe); font-family: 'Archivo Black', sans-serif; text-align: center; margin-bottom: 25px; text-transform: uppercase; font-size: 20px; }
        label { display: block; margin-top: 12px; font-size: 11px; color: #888; font-weight: bold; text-transform: uppercase; }
        input { 
            width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #333; 
            margin-top: 5px; background: #222; color: #fff; font-weight: bold; box-sizing: border-box;
        }
        
        .cores { display: flex; gap: 8px; margin-top: 10px; }
        .cor { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid #333; }
        .cor.ativa { border-color: #fff; transform: scale(1.1); box-shadow: 0 0 10px var(--cor-main); }

        button { 
            width: 100%; padding: 16px; border: none; border-radius: 6px; margin-top: 20px; 
            font-weight: 900; cursor: pointer; text-transform: uppercase; background: var(--cor-detalhe); color: #000;
        }

        /* ÁREA DE PREVIEW */
        .preview-area { flex: 1; display: flex; justify-content: center; align-items: center; background: #1e1e1e; padding: 10px; }

        /* O ENCARTE - PROPORÇÃO A4 REAL */
        .encarte { 
            width: auto;
            height: 90vh; /* Ajusta na tela */
            aspect-ratio: 210 / 297; /* Proporção A4 */
            background: #fff; position: relative; 
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); font-family: 'Archivo Black', sans-serif;
        }

        /* CONTEÚDO DISTRIBUÍDO */
        .bloco-topo { background: var(--cor-main); padding: 5% 2%; text-align: center; }
        .bloco-topo h1 { margin: 0; font-size: 2.8rem; color: #fff; font-style: italic; text-transform: uppercase; transform: skewX(-10deg); line-height: 0.9; }
        .faixa-amarela { background: var(--cor-detalhe); color: #000; font-size: 1rem; margin-top: 10px; padding: 5px; text-transform: uppercase; }

        .bloco-imagem { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; background: radial-gradient(circle, #fff 0%, #f0f0f0 100%); }
        .bloco-imagem img { max-width: 90%; max-height: 90%; object-fit: contain; }

        .bloco-nome { background: #222; color: #fff; padding: 20px 10px; text-align: center; font-size: 1.8rem; text-transform: uppercase; border-bottom: 6px solid var(--cor-detalhe); }

        .bloco-preco { height: 25%; position: relative; display: flex; justify-content: center; align-items: center; background: #fff; }

        .selo-explosao {
            width: 160px; height: 160px; background: var(--cor-main);
            clip-path: polygon(100% 50%, 94% 63%, 95% 77%, 83% 83%, 77% 95%, 63% 94%, 50% 100%, 37% 94%, 23% 95%, 17% 83%, 5% 77%, 6% 63%, 0% 50%, 6% 37%, 5% 23%, 17% 17%, 23% 5%, 37% 6%, 50% 0%, 63% 6%, 77% 5%, 83% 17%, 95% 23%, 94% 37%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 3px solid var(--cor-detalhe); color: #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .rs { font-size: 1.2rem; color: var(--cor-detalhe); margin-bottom: -10px; margin-left: -50px; }
        .valor-box { display: flex; align-items: flex-start; }
        .inteiro { font-size: 4.5rem; line-height: 0.8; letter-spacing: -3px; }
        .centavos { font-size: 2rem; color: var(--cor-detalhe); margin-top: 5px; }
        .unidade { font-size: 0.9rem; margin-top: 5px; background: rgba(0,0,0,0.3); padding: 2px 12px; border-radius: 50px; border: 1px solid var(--cor-detalhe); }

        .bloco-rodape { background: #000; color: #fff; padding: 10px; font-size: 0.7rem; text-align: center; font-family: sans-serif; font-weight: normal; }
    </style>
</head>
<body>

<div class="painel">
    <h2>COUTO EDIT <span style="color:#fff">V3</span></h2>

    <label>1. Foto do Produto</label>
    <input type="file" id="produtoInput">

    <label>2. Chamada</label>
    <input type="text" id="tituloTxt" value="OFERTA IMBATÍVEL">

    <label>3. Nome do Produto</label>
    <input type="text" id="nome" value="CERVEJA LATA 350ML">

    <label>4. Preço</label>
    <input type="text" id="preco" value="3,49">

    <label>5. Unidade</label>
    <input type="text" id="unidade" value="CADA">

    <label>6. Texto do Rodapé</label>
    <input type="text" id="rodapeTxt" value="Ofertas válidas enquanto durarem os estoques. Imagens meramente ilustrativas.">

    <label>7. Cor do Tema</label>
    <div class="cores">
        <div class="cor ativa" style="background:#e60000" onclick="mudarCor('#e60000', this)"></div>
        <div class="cor" style="background:#0047ab" onclick="mudarCor('#0047ab', this)"></div>
        <div class="cor" style="background:#008000" onclick="mudarCor('#008000', this)"></div>
        <div class="cor" style="background:#ff6600" onclick="mudarCor('#ff6600', this)"></div>
    </div>

    <button onclick="baixarImagem()">BAIXAR PARA IMPRIMIR (A4)</button>
</div>

<div class="preview-area">
    <div class="encarte" id="encarte">
        <div class="bloco-topo" id="topoCor">
            <h1 id="tituloPreview">OFERTA IMBATÍVEL</h1>
            <div class="faixa-amarela">PREÇO BAIXO DE VERDADE É AQUI!</div>
        </div>

        <div class="bloco-imagem">
            <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" id="previewImg">
        </div>

        <div class="bloco-nome" id="nomePreview">CERVEJA LATA 350ML</div>

        <div class="bloco-preco">
            <div class="selo-explosao" id="seloCor">
                <span class="rs">R$</span>
                <div class="valor-box">
                    <span class="inteiro" id="intPart">3</span>
                    <span class="centavos" id="centPart">,49</span>
                </div>
                <span class="unidade" id="unPreview">CADA</span>
            </div>
        </div>

        <div class="bloco-rodape" id="rodapePreview">
            Ofertas válidas enquanto durarem os estoques. Imagens meramente ilustrativas.
        </div>
    </div>
</div>

<script>
    const precoIn = document.getElementById('preco');
    
    function atualizarPreco() {
        const valor = precoIn.value.replace('.', ',');
        const partes = valor.split(',');
        document.getElementById('intPart').innerText = partes[0];
        document.getElementById('centPart').innerText = partes[1] ? ',' + partes[1] : ',00';
    }

    document.getElementById('tituloTxt').oninput = e => document.getElementById('tituloPreview').innerText = e.target.value.toUpperCase();
    document.getElementById('nome').oninput = e => document.getElementById('nomePreview').innerText = e.target.value.toUpperCase();
    document.getElementById('unidade').oninput = e => document.getElementById('unPreview').innerText = e.target.value.toUpperCase();
    document.getElementById('rodapeTxt').oninput = e => document.getElementById('rodapePreview').innerText = e.target.value;
    precoIn.oninput = atualizarPreco;

    document.getElementById('produtoInput').onchange = e => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = () => document.getElementById('previewImg').src = reader.result;
            reader.readAsDataURL(file);
        }
    }

    function mudarCor(cor, el) {
        document.documentElement.style.setProperty('--cor-main', cor);
        document.getElementById('topoCor').style.background = cor;
        document.getElementById('seloCor').style.background = cor;
        document.querySelectorAll('.cor').forEach(c => c.classList.remove('ativa'));
        el.classList.add('ativa');
    }

    function baixarImagem() {
        const encarte = document.getElementById('encarte');
        html2canvas(encarte, { 
            scale: 4, 
            useCORS: true,
            logging: false
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = `Encarte_A4_${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    }

    atualizarPreco();
</script>

</body>
</html>
