<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado Couto - Ad Creator Pro</title>
    <style>
        :root {
            --primary-red: #d32f2f;
            --dark-bg: #222;
            --input-bg: #fff;
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #1a1a1a; 
            color: #fff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header { 
            background: linear-gradient(90deg, #b71c1c, #e53935);
            padding: 15px; 
            text-align: left;
            padding-left: 50px;
            font-weight: 900; 
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
            padding: 30px;
            max-width: 1300px;
            margin: auto;
        }

        @media(min-width: 1000px) {
            .main-container { grid-template-columns: 400px 1fr; }
        }

        .controls-card {
            background: #2a2a2a;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .control-group { margin-bottom: 20px; }
        
        label { 
            display: block; 
            font-size: 13px; 
            font-weight: bold; 
            margin-bottom: 8px; 
            color: #bbb;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #fff;
            color: #333;
            font-size: 15px;
            font-weight: 500;
        }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        
        button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-update { background: #1e88e5; color: white; }
        .btn-save { background: #ffc107; color: #000; }
        .btn-download { background: #43a047; color: white; grid-column: span 2; }

        .preview-pane {
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        canvas {
            max-width: 100%;
            height: auto;
            background: #fff;
            border-radius: 4px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

<header>🚀 MERCADO COUTO - AD CREATOR PRO</header>

<div class="main-container">
    <div class="controls-card">
        <div class="control-group">
            <label>Produto</label>
            <input id="prodNome" value="CERVEJA LATA 350ML" oninput="draw()">
        </div>
        
        <div class="control-group">
            <label>Preço</label>
            <input id="prodPreco" value="3,49" oninput="draw()">
        </div>

        <div class="control-group">
            <label>Texto Extra</label>
            <textarea id="prodExtra" oninput="draw()">Oferta válida até durar o estoque.</textarea>
        </div>

        <div class="control-group">
            <label>Imagem do Produto</label>
            <input type="file" id="imgUpload" accept="image/*">
        </div>

        <div class="btn-grid">
            <button class="btn-update" onclick="draw()">Atualizar</button>
            <button class="btn-save" onclick="download()">Salvar PNG</button>
        </div>
    </div>

    <div class="preview-pane">
        <canvas id="canvas" width="1080" height="1350"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let productImg = null;

    // Listener de Upload
    document.getElementById('imgUpload').onchange = e => {
        const reader = new FileReader();
        reader.onload = () => {
            productImg = new Image();
            productImg.onload = draw;
            productImg.src = reader.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function draw() {
        const nome = document.getElementById('prodNome').value.toUpperCase();
        const preco = document.getElementById('prodPreco').value;
        const extra = document.getElementById('prodExtra').value;

        // 1. Fundo Branco
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. Título "OFERTA DO DIA" com Sombra
        ctx.textAlign = 'center';
        ctx.fillStyle = '#d32f2f';
        ctx.font = 'bold 110px Arial Black';
        ctx.shadowColor = 'rgba(0,0,0,0.15)';
        ctx.shadowBlur = 10;
        ctx.shadowOffsetY = 10;
        ctx.fillText("OFERTA DO DIA", canvas.width/2, 320);
        ctx.shadowBlur = 0;
        ctx.shadowOffsetY = 0;

        // 3. Imagem do Produto
        if(productImg) {
            const ratio = Math.min(800 / productImg.width, 600 / productImg.height);
            const w = productImg.width * ratio;
            const h = productImg.height * ratio;
            ctx.drawImage(productImg, (canvas.width - w)/2, 400, w, h);
        }

        // 4. Selo de Preço Inclinado (O estilo da sua prévia)
        const seloX = 50;
        const seloY = 1000;
        const seloW = 980;
        const seloH = 260;

        ctx.save();
        ctx.translate(canvas.width/2, seloY);
        ctx.rotate(-0.03); // Inclinação leve

        // Retângulo Amarelo com Borda Preta Dupla
        ctx.fillStyle = "#ffcc00";
        ctx.fillRect(-seloW/2, -50, seloW, seloH);
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 4;
        ctx.strokeRect(-seloW/2, -50, seloW, seloH);
        
        // Texto Produto dentro do selo
        ctx.fillStyle = "#000";
        ctx.font = "bold 45px Arial";
        ctx.fillText(nome, 0, 15);

        // Preço Gigante
        ctx.font = "bold 65px Arial";
        ctx.fillText("R$", -240, 130);
        
        ctx.font = "black 200px Arial Black";
        ctx.fillText(preco, 120, 160);
        
        ctx.restore();

        // 5. Rodapé
        ctx.fillStyle = "#333";
        ctx.font = "35px Arial";
        ctx.fillText(extra, canvas.width/2, 1300);
    }

    function download() {
        const link = document.createElement('a');
        link.download = 'oferta_couto.png';
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
    }

    // Carregamento inicial
    window.onload = draw;
</script>

</body>
</html>
