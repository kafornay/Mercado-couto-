<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercado Couto - Designer de Elite</title>

<!-- Biblioteca PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root { --red:#e31d1a; --yellow:#ffdf00; --dark:#0a0a0a; }
*{ box-sizing:border-box; margin:0; padding:0; }
body{ font-family:'Arial Black',sans-serif; background:var(--dark); color:#fff; }

header{
background:linear-gradient(to right,#000,#b71c1c,#000);
padding:15px;text-align:center;border-bottom:2px solid var(--yellow);
text-transform:uppercase;letter-spacing:2px;font-size:14px;
}

.wrapper{ display:grid; grid-template-columns:1fr; gap:20px; padding:20px; max-width:1400px; margin:auto;}
@media(min-width:1000px){ .wrapper{ grid-template-columns:350px 1fr; } }

.panel{
background:#1a1a1a;padding:25px;border-radius:12px;border:1px solid #333;
display:flex;flex-direction:column;gap:12px;height:fit-content;
}

input,textarea{
width:100%;padding:12px;border-radius:6px;border:1px solid #444;
background:#fff;color:#000;font-weight:900;font-size:14px;
}

.file-input{ background:#2a2a2a;color:#fff;border:1px dashed #555;cursor:pointer;}

.btn-action{
background:var(--yellow);color:#000;border:none;padding:18px;
border-radius:8px;font-weight:900;cursor:pointer;text-transform:uppercase;
}

.artboard{ display:flex;justify-content:center; }
canvas{ max-width:100%; background:#fff; box-shadow:0 30px 100px rgba(0,0,0,.9);}
</style>
</head>

<body>

<header>🚀 Editor de Ofertas - Mercado Couto</header>

<div class="wrapper">
<div class="panel">
<input type="file" id="fLogo" class="file-input" accept="image/*">
<input type="file" id="fProd" class="file-input" accept="image/*">

<input id="pNome" value="CERVEJA ITAIPAVA 473ML" oninput="draw()">
<input id="pPreco" value="3,59" oninput="draw()">
<textarea id="pExtra" oninput="draw()">Oferta válida enquanto durarem os estoques</textarea>

<button class="btn-action" onclick="downloadImage()">Baixar IMAGEM</button>
<button class="btn-action" onclick="downloadPDF()">Baixar PDF</button>
</div>

<div class="artboard">
<canvas id="canvas" width="2480" height="3508"></canvas>
</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let imgLogo = new Image();
let imgProd = null;

imgLogo.src = '';

document.getElementById('fLogo').onchange = e => loadFile(e, img => { imgLogo = img; draw(); });
document.getElementById('fProd').onchange = e => loadFile(e, img => { imgProd = img; draw(); });

function loadFile(e, cb){
const r = new FileReader();
r.onload = () => {
const i = new Image();
i.onload = () => cb(i);
i.src = r.result;
};
r.readAsDataURL(e.target.files[0]);
}

function draw(){
const nome = document.getElementById('pNome').value.toUpperCase();
const preco = document.getElementById('pPreco').value;
const extra = document.getElementById('pExtra').value;

ctx.clearRect(0,0,canvas.width,canvas.height);

const grad = ctx.createLinearGradient(0,0,0,canvas.height);
grad.addColorStop(0,'#ffffff');
grad.addColorStop(1,'#dcdcdc');
ctx.fillStyle = grad;
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.textAlign='center';
ctx.fillStyle='#e31d1a';
ctx.font='900 260px Arial';
ctx.fillText("OFERTA",canvas.width/2,800);

ctx.fillStyle='#333';
ctx.font='900 140px Arial';
ctx.fillText("DO DIA",canvas.width/2,980);

if(imgLogo){
ctx.drawImage(imgLogo,canvas.width/2-300,150,600,300);
}

if(imgProd){
ctx.drawImage(imgProd,canvas.width/2-600,1100,1200,1200);
}

ctx.fillStyle='#000';
ctx.font='900 600px Arial';
ctx.fillText(preco,canvas.width/2,2700);

ctx.font='bold 70px Arial';
ctx.fillText(extra,canvas.width/2,3400);
}

function redrawAndWait(){
return new Promise(resolve=>{
draw();
requestAnimationFrame(()=>{
requestAnimationFrame(()=>resolve());
});
});
}

function downloadImage(){
const link=document.createElement('a');
link.download='encarte.png';
link.href=canvas.toDataURL('image/png',1);
link.click();
}

async function downloadPDF(){
await redrawAndWait();

const { jsPDF } = window.jspdf;

const pdf=new jsPDF({
orientation:"portrait",
unit:"mm",
format:"a4"
});

const imgData=canvas.toDataURL("image/jpeg",1.0);

pdf.addImage(imgData,"JPEG",0,0,210,297);
pdf.save("encarte.pdf");
}

window.onload=draw;
</script>

</body>
</html>
