<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mercado Couto | Designer PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    margin:0;
    font-family:'Arial Black',sans-serif;
    background:#111;
    color:#fff;
    display:flex;
    height:100vh;
}
.sidebar{
    width:320px;
    background:#1a1a1a;
    padding:20px;
    border-right:2px solid #e31d1a;
    overflow-y:auto;
}
.field{margin-bottom:15px;}
label{
    display:block;
    font-size:11px;
    color:#888;
    margin-bottom:5px;
    text-transform:uppercase;
}
input,select,textarea{
    width:100%;
    padding:10px;
    background:#222;
    border:1px solid #444;
    color:#fff;
    border-radius:4px;
    box-sizing:border-box;
}
.btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:4px;
    font-weight:bold;
    cursor:pointer;
    text-transform:uppercase;
    margin-top:10px;
}
.btn-img{background:#ffdf00;color:#000;}
.btn-pdf{background:#fff;color:#000;}

.preview{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#000;
    padding:20px;
}
canvas{
    max-height:90vh;
    max-width:100%;
    background:#fff;
    box-shadow:0 0 30px rgba(0,0,0,.5);
}
</style>
</head>

<body>

<div class="sidebar">
<h2 style="color:#ffdf00">COUTO EDIT</h2>

<div class="field"><label>Logo</label>
<input type="file" id="fLogo" accept="image/*"></div>

<div class="field"><label>Produto (PNG)</label>
<input type="file" id="fProd" accept="image/*"></div>

<div class="field"><label>Nome do Produto</label>
<input type="text" id="pNome" value="CERVEJA LATA 350ML"></div>

<div class="field"><label>Preço</label>
<input type="text" id="pPreco" value="3,49"></div>

<div class="field">
<label>Cor do Encarte</label>
<select id="pCor">
<option value="#e31d1a">Vermelho</option>
<option value="#2e7d32">Verde</option>
<option value="#0d47a1">Azul</option>
</select>
</div>

<div class="field">
<label>Rodapé</label>
<textarea id="pExtra">Ofertas válidas enquanto durarem os estoques.</textarea>
</div>

<button class="btn btn-img" onclick="downloadImage()">Baixar Imagem</button>
<button class="btn btn-pdf" onclick="downloadPDF()">Baixar PDF</button>
</div>

<div class="preview">
<canvas id="canvas"></canvas>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// resolução real de impressão (A4 300dpi)
canvas.width = 2480;
canvas.height = 3508;

let imgLogo = null;
let imgProd = null;

function loadImage(file, callback){
    if(!file) return;
    const reader = new FileReader();
    reader.onload = e=>{
        const img = new Image();
        img.onload = ()=>callback(img);
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

document.getElementById('fLogo').onchange = e=>{
    loadImage(e.target.files[0], img=>{
        imgLogo = img;
        draw();
    });
};

document.getElementById('fProd').onchange = e=>{
    loadImage(e.target.files[0], img=>{
        imgProd = img;
        draw();
    });
};

document.querySelectorAll("input,select,textarea")
.forEach(el=>el.oninput = draw);

function formatPreco(v){
    v = v.replace(",",".");
    const num = parseFloat(v) || 0;
    return num.toFixed(2);
}

function draw(){

    const nome = document.getElementById('pNome').value.toUpperCase();
    const preco = formatPreco(document.getElementById('pPreco').value);
    const cor = document.getElementById('pCor').value;
    const extra = document.getElementById('pExtra').value;

    const [reais,centavos] = preco.split(".");

    ctx.fillStyle="#fff";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // topo
    ctx.fillStyle=cor;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.lineTo(canvas.width,0);
    ctx.lineTo(canvas.width,500);
    ctx.quadraticCurveTo(canvas.width/2,650,0,500);
    ctx.fill();

    ctx.fillStyle="#fff";
    ctx.font="bold 180px Arial";
    ctx.textAlign="center";
    ctx.fillText("OFERTA",canvas.width/2,350);

    // logo
    if(imgLogo){
        const h=250;
        const w=imgLogo.width*(h/imgLogo.height);
        ctx.drawImage(imgLogo,120,120,w,h);
    }

    // produto
    if(imgProd){
        const w=1400;
        const h=imgProd.height*(w/imgProd.width);
        ctx.drawImage(imgProd,(canvas.width-w)/2,900-h,w,h);
    }

    // nome
    ctx.fillStyle="#000";
    ctx.font="bold 140px Arial";
    ctx.fillText(nome,canvas.width/2,2100);

    // bolha preço
    ctx.fillStyle=cor;
    ctx.beginPath();
    ctx.arc(canvas.width/2,2600,420,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="#fff";
    ctx.font="bold 140px Arial";
    ctx.fillText("R$",canvas.width/2-260,2550);

    ctx.font="bold 420px Arial";
    ctx.fillText(reais,canvas.width/2,2800);

    ctx.font="bold 160px Arial";
    ctx.fillText(","+centavos,canvas.width/2+300,2550);

    ctx.fillStyle="#666";
    ctx.font="60px Arial";
    ctx.fillText(extra,canvas.width/2,3350);
}

function downloadImage(){
    const link=document.createElement('a');
    link.download="oferta_couto.png";
    link.href=canvas.toDataURL("image/png");
    link.click();
}

function downloadPDF(){
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF('p','mm','a4');
    pdf.addImage(canvas.toDataURL("image/jpeg",1.0),'JPEG',0,0,210,297);
    pdf.save("oferta_couto.pdf");
}

draw();
</script>
</body>
</html>
