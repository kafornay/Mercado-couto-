<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado Couto - Designer Premium</title>
    <style>
        :root { 
            --primary: #d32f2f; 
            --accent: #ffcc00; 
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-dark); 
            color: #fff;
            display: flex;
            flex-direction: column;
        }

        /* Header Moderno */
        header { 
            background: linear-gradient(135deg, #000, #222);
            padding: 20px; 
            text-align: center;
            border-bottom: 4px solid var(--primary);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        header h1 { margin: 0; font-size: 1.2rem; letter-spacing: 2px; color: #fff; }
        header span { color: var(--primary); }

        .container { 
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: auto;
            width: 100%;
        }

        @media(min-width: 900px) {
            .container { flex-direction: row; align-items: flex-start; }
            .side-panel { width: 400px; position: sticky; top: 20px; }
            .preview-panel { flex: 1; }
        }

        /* Painel de Controles */
        .side-panel { 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 1px solid #333;
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; text-transform: uppercase; color: #888; margin-bottom: 5px; font-weight: bold; }
        
        input, textarea { 
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #444; 
            background: #2d2d2d; color: #fff; font-size: 16px; transition: 0.3s;
        }

        input:focus { border-color: var(--primary); outline: none; background: #333; }

        .btn-download { 
            width: 100%; background: var(--primary); color: white; border: none; 
            padding: 18px; border-radius: 12px; font-weight: 900; cursor: pointer; 
            font-size: 16px; margin-top: 10px; text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(211, 47, 47, 0.4);
        }

        /* Preview Area */
        .preview-panel { display: flex; flex-direction: column; align-items: center; }
        canvas { 
            max-width: 100%; height: auto; background: white; border-radius: 5px;
            box-shadow: 0 20px 80px rgba(0,0,0,0.8);
        }

        .hint { margin-top: 15px; color: #666; font-size: 13px; }
    </style>
</head>
<body>

<header>
    <h1>MERCADO <span>COUTO</span> DESIGNER</h1>
</header>

<div class="container">
    <div class="side-panel">
        <div class="input-group">
            <label>Sua Logo (Transparente é melhor)</label>
            <input type="file" id="fLogo" accept="image/*">
        </div>

        <div class="input-group">
            <label>Imagem do Produto</label>
            <input type="file" id="fProd" accept="image/*">
        </div>

        <div class="input-group">
            <label>Nome do Produto</label>
            <input id="pNome" value="CERVEJA ITAIPAVA 473ML" oninput="draw()">
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
            <div class="input-group">
                <label>Preço</label>
                <input id="pPreco" value="3,59" oninput="draw()">
            </div>
            <div class="input-group">
                <label>Cor do Selo</label>
                <input type="color" id="cSelo" value="#ffcc00" oninput="draw()">
            </div>
        </div>

        <div class="input-group">
            <label>Rodapé</label>
            <textarea id="pExtra" rows="2" oninput="draw()">Oferta válida até durar o estoque.</textarea>
        </div>

        <button class="btn-download" onclick="download()">Baixar Propaganda A4</button>
    </div>

    <div class="preview-panel">
        <canvas id="canvas" width="2480" height="3508"></canvas>
        <div class="hint">Resolução Profissional: 2480x3508px (A4 300DPI)</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let imgLogo = null;
    let imgProd = null;

    // Carregar arquivos
    document.getElementById('fLogo').onchange = e => loadImg(e, img => { imgLogo = img; draw(); });
    document.getElementById('fProd').onchange = e => loadImg(e, img => { imgProd = img; draw(); });

    function loadImg(e, callback) {
        const reader = new FileReader();
        reader.onload = () => {
            const img = new Image();
            img.onload = () => callback(img);
            img.src = reader.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    function draw() {
        const nome = document.getElementById('pNome').value.toUpperCase();
        const preco = document.getElementById('pPreco').value;
        const extra = document.getElementById('pExtra').value;
        const cSelo = document.getElementById('cSelo').value;

        // 1. Fundo com degradê sutil
        const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, '#ffffff');
        grad.addColorStop(1, '#f2f2f2');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. Logo
        if(imgLogo) {
            const scale = Math.min(800/imgLogo.width, 400/imgLogo.height);
            ctx.drawImage(imgLogo, (canvas.width - imgLogo.width*scale)/2, 150, imgLogo.width*scale, imgLogo.height*scale);
        }

        // 3. Texto "OFERTA DO DIA" com estilo
        ctx.textAlign = 'center';
        ctx.fillStyle = '#d32f2f';
        ctx.font = 'bold 220px "Arial Black"';
        ctx.fillText("OFERTA DO DIA", canvas.width/2, 850);

        // Linha elegante
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.moveTo(400, 950); ctx.lineTo(canvas.width-400, 950);
        ctx.stroke();

        // 4. Imagem do Produto com Sombra
        if(imgProd) {
            const pScale = Math.min(1800/imgProd.width, 1400/imgProd.height);
            const pw = imgProd.width * pScale;
            const ph = imgProd.height * pScale;
            
            ctx.shadowColor = 'rgba(0,0,0,0.2)';
            ctx.shadowBlur = 50;
            ctx.shadowOffsetY = 40;
            ctx.drawImage(imgProd, (canvas.width - pw)/2, 1100, pw, ph);
            ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
        }

        // 5. Selo de Preço Premium (Estilo Badge)
        ctx.save();
        ctx.translate(canvas.width/2, 2800);
        
        // Sombra do selo
        ctx.shadowColor = 'rgba(0,0,0,0.3)';
        ctx.shadowBlur = 40;

        // Fundo do Preço
        ctx.rotate(-0.03);
        ctx.fillStyle = '#d32f2f'; // Tarja vermelha para o nome
        ctx.roundRect(-900, -320, 1800, 180, 20).fill();
        
        ctx.fillStyle = cSelo; // Fundo amarelo para o valor
        ctx.roundRect(-1000, -150, 2000, 550, 60).fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 15;
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Textos do Selo
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 90px Arial';
        ctx.fillText(nome, 0, -190);

        ctx.fillStyle = '#000';
        ctx.font = 'bold 100px Arial';
        ctx.fillText("R$", -750, 180);
        
        ctx.font = '900 500px "Arial Black"';
        ctx.fillText(preco, 100, 280);
        ctx.restore();

        // 6. Rodapé
        ctx.fillStyle = '#666';
        ctx.font = '70px Arial';
        ctx.fillText(extra, canvas.width/2, 3420);
    }

    // Polyfill para navegadores antigos (roundRect)
    if (!Path2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.beginPath();
            this.moveTo(x + r, y);
            this.arcTo(x + w, y, x + w, y + h, r);
            this.arcTo(x + w, y + h, x, y + h, r);
            this.arcTo(x, y + h, x, y, r);
            this.arcTo(x, y, x + w, y, r);
            this.closePath();
            return this;
        };
    }

    function download() {
        const link = document.createElement('a');
        link.download = 'MERCADO_COUTO_A4.png';
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
    }

    window.onload = draw;
</script>
</body>
</html>
