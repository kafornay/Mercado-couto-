<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado Couto - Designer Oficial</title>
    <style>
        :root { --primary: #c62828; --accent: #ffcc00; --dark: #121212; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Arial', sans-serif; background: var(--dark); color: white; }
        
        header { 
            background: #000; padding: 15px; text-align: center; 
            border-bottom: 4px solid var(--primary); font-weight: 900;
        }

        .main-container { 
            display: flex; flex-direction: column; gap: 20px; padding: 20px; 
            max-width: 1300px; margin: auto; 
        }

        @media(min-width: 950px) {
            .main-container { flex-direction: row; align-items: flex-start; }
            .controls { width: 400px; position: sticky; top: 20px; }
            .preview { flex: 1; }
        }

        .controls { 
            background: #1e1e1e; padding: 25px; border-radius: 15px; 
            display: flex; flex-direction: column; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        label { font-size: 11px; font-weight: bold; color: #888; text-transform: uppercase; }
        input, textarea { 
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; 
            background: #fff; color: #333; font-weight: 700; font-size: 16px;
        }

        .btn-save { 
            background: var(--primary); color: white; border: none; padding: 18px; 
            border-radius: 10px; font-weight: 900; cursor: pointer; transition: 0.3s;
        }
        .btn-save:hover { background: #ff1744; transform: scale(1.02); }

        canvas { 
            max-width: 100%; height: auto; background: white; 
            border-radius: 4px; box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

<header>MERCADO COUTO - GERADOR DE ENCARTES</header>

<div class="main-container">
    <div class="controls">
        <label>Sua Logo</label>
        <input type="file" id="fLogo" accept="image/*">

        <label>Imagem do Produto</label>
        <input type="file" id="fProd" accept="image/*">

        <label>Nome do Produto</label>
        <input id="pNome" value="CERVEJA ITAIPAVA LATÃO 473ML" oninput="draw()">

        <label>Preço</label>
        <input id="pPreco" value="3,59" oninput="draw()">

        <label>Texto Rodapé</label>
        <textarea id="pExtra" oninput="draw()">Oferta válida até durar o estoque.</textarea>

        <button class="btn-save" onclick="download()">BAIXAR IMAGEM A4</button>
    </div>

    <div class="preview">
        <canvas id="canvas" width="2480" height="3508"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let imgLogo = new Image();
    let imgProd = null;

    // Logo padrão (caso queira deixar uma fixa)
    imgLogo.onload = draw;
    imgLogo.src = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==';

    document.getElementById('fLogo').onchange = e => {
        const r = new FileReader();
        r.onload = () => { imgLogo = new Image(); imgLogo.onload = draw; imgLogo.src = r.result; };
        r.readAsDataURL(e.target.files[0]);
    };

    document.getElementById('fProd').onchange = e => {
        const r = new FileReader();
        r.onload = () => { imgProd = new Image(); imgProd.onload = draw; imgProd.src = r.result; };
        r.readAsDataURL(e.target.files[0]);
    };

    function draw() {
        const nome = document.getElementById('pNome').value.toUpperCase();
        const preco = document.getElementById('pPreco').value;
        const extra = document.getElementById('pExtra').value;

        // 1. Fundo com brilho central (Radial Gradient)
        const bgGrad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 100, canvas.width/2, canvas.height/2, 2000);
        bgGrad.addColorStop(0, '#ffffff');
        bgGrad.addColorStop(1, '#e0e0e0');
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. Logo (Centralizada no topo)
        if (imgLogo.complete) {
            const lScale = Math.min(600/imgLogo.width, 400/imgLogo.height);
            const lw = imgLogo.width * lScale;
            const lh = imgLogo.height * lScale;
            ctx.drawImage(imgLogo, (canvas.width - lw)/2, 150, lw, lh);
            
            // Sombra da logo
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.beginPath();
            ctx.ellipse(canvas.width/2, 180 + lh, 150, 20, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        // 3. Título "OFERTA DO DIA"
        ctx.textAlign = 'center';
        ctx.fillStyle = '#b71c1c';
        ctx.font = 'bold 240px "Arial Narrow", Arial';
        ctx.fillText("OFERTA DO DIA", canvas.width/2, 1000);

        // Linhas decorativas
        ctx.strokeStyle = '#444';
        ctx.lineWidth = 10;
        ctx.beginPath();
        ctx.moveTo(400, 1080); ctx.lineTo(1100, 1080);
        ctx.moveTo(1380, 1080); ctx.lineTo(2080, 1080);
        ctx.stroke();

        // 4. Imagem do Produto com Sombra Flutuante
        if(imgProd) {
            const pScale = Math.min(1800/imgProd.width, 1400/imgProd.height);
            const pw = imgProd.width * pScale;
            const ph = imgProd.height * pScale;
            
            // Sombra abaixo do produto
            ctx.shadowColor = 'rgba(0,0,0,0.2)';
            ctx.shadowBlur = 80;
            ctx.shadowOffsetY = 50;
            ctx.drawImage(imgProd, (canvas.width - pw)/2, 1200, pw, ph);
            ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
        }

        // 5. SELO DE PREÇO (IDÊNTICO À IMAGEM)
        ctx.save();
        ctx.translate(canvas.width/2, 2850);
        ctx.rotate(-0.04);

        // Sombra externa do selo
        ctx.shadowColor = 'rgba(0,0,0,0.3)';
        ctx.shadowBlur = 40;

        // Corpo do Selo (Amarelo com borda branca e preta)
        const sW = 1800, sH = 600;
        ctx.fillStyle = '#000'; // Borda externa preta
        ctx.roundRect(-sW/2 - 10, -sH/2 - 10, sW + 20, sH + 20, 40).fill();
        
        ctx.fillStyle = '#fff'; // Borda interna branca
        ctx.roundRect(-sW/2, -sH/2, sW, sH, 30).fill();

        // Degradê amarelo do selo
        const seloGrad = ctx.createLinearGradient(0, -sH/2, 0, sH/2);
        seloGrad.addColorStop(0, '#ffeb3b');
        seloGrad.addColorStop(1, '#fbc02d');
        ctx.fillStyle = seloGrad;
        ctx.roundRect(-sW/2 + 15, -sH/2 + 15, sW - 30, sH - 30, 20).fill();
        ctx.shadowBlur = 0;

        // Faixa Vermelha do Nome do Produto
        ctx.fillStyle = '#c62828';
        ctx.beginPath();
        ctx.moveTo(-sW/2 - 50, -sH/2 + 50);
        ctx.lineTo(sW/2 - 200, -sH/2 - 100);
        ctx.lineTo(sW/2 + 50, -sH/2 + 50);
        ctx.lineTo(-sW/2 + 200, -sH/2 + 150);
        ctx.fill();
        
        // Texto do Produto na Faixa
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 90px Arial';
        ctx.fillText(nome, 0, -sH/2 + 65);

        // Cifrão e Valor
        ctx.fillStyle = '#000';
        ctx.textAlign = 'left';
        ctx.font = 'bold 120px Arial';
        ctx.fillText("R$", -750, 150);
        
        ctx.textAlign = 'center';
        ctx.font = '900 550px Arial Black';
        ctx.fillText(preco, 100, 250);

        ctx.restore();

        // 6. Rodapé
        ctx.textAlign = 'center';
        ctx.fillStyle = '#555';
        ctx.font = '75px Arial';
        ctx.fillText(extra, canvas.width/2, 3420);
    }

    // Suporte para roundRect em navegadores que não tem
    if (!Path2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.beginPath();
            this.moveTo(x + r, y);
            this.arcTo(x + w, y, x + w, y + h, r);
            this.arcTo(x + w, y + h, x, y + h, r);
            this.arcTo(x, y + h, x, y, r);
            this.arcTo(x, y, x + w, y, r);
            this.closePath();
            return this;
        };
    }

    function download() {
        const link = document.createElement('a');
        link.download = 'oferta_couto_premium.png';
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
    }

    window.onload = draw;
</script>
</body>
</html>
