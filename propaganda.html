<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado Couto - Smart A4</title>
    <style>
        :root { --primary: #d32f2f; --accent: #ffc107; --dark: #121212; }
        
        * { box-sizing: border-box; }
        
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--dark); 
            color: #eee;
        }

        header { 
            background: #000; 
            padding: 15px; 
            text-align: center;
            border-bottom: 3px solid var(--primary);
            font-weight: 900;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .main-container { 
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 15px;
            max-width: 1200px;
            margin: auto;
        }

        /* Layout para Desktop */
        @media(min-width: 900px) {
            .main-container { flex-direction: row; align-items: flex-start; }
            .controls { width: 400px; position: sticky; top: 20px; }
            .preview-area { flex: 1; }
        }

        .controls { 
            background: #1e1e1e; 
            padding: 20px; 
            border-radius: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .section-label {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--primary);
            font-weight: 800;
            margin-top: 5px;
        }

        input, textarea, select { 
            width: 100%; 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #333; 
            background: #2d2d2d; 
            color: #fff;
            font-size: 16px; /* Evita zoom automático no iOS */
        }

        .color-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-save { 
            background: var(--accent); 
            color: #000; 
            border: none; 
            padding: 18px; 
            border-radius: 12px; 
            font-weight: 900; 
            cursor: pointer; 
            font-size: 16px;
            margin-top: 10px;
            transition: 0.2s;
        }

        .btn-save:active { transform: scale(0.98); }

        .preview-area { 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }

        canvas { 
            max-width: 100%; 
            height: auto; 
            background: white; 
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }

        .footer-info {
            margin-top: 10px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>

<header>MERCADO COUTO PRO</header>

<div class="main-container">
    <div class="controls">
        <div class="section-label">Informações</div>
        <input id="pNome" placeholder="Nome do Produto" value="CERVEJA LATA 350ML" oninput="draw()">
        <input id="pPreco" placeholder="Preço" value="3,49" oninput="draw()">
        <textarea id="pExtra" rows="2" oninput="draw()">Oferta válida apenas para hoje!</textarea>

        <div class="section-label">Visual</div>
        <div class="color-group">
            <div>
                <label style="font-size:10px">Fundo</label>
                <input type="color" id="cBg" value="#ffffff" oninput="draw()">
            </div>
            <div>
                <label style="font-size:10px">Selo</label>
                <input type="color" id="cSelo" value="#ffcc00" oninput="draw()">
            </div>
        </div>

        <div class="section-label">Imagens</div>
        <input type="file" id="fProd" accept="image/*">
        
        <button class="btn-save" onclick="download()">BAIXAR ARQUIVO A4</button>
    </div>

    <div class="preview-area">
        <canvas id="canvas" width="2480" height="3508"></canvas>
        <div class="footer-info">Tamanho de saída: A4 (Alta Resolução)</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let imgProd = null;

    // Detecta contraste para cor de texto
    function getContrastColor(hex){
        hex = hex.replace("#", "");
        const r = parseInt(hex.substr(0,2),16);
        const g = parseInt(hex.substr(2,2),16);
        const b = parseInt(hex.substr(4,2),16);
        const yiq = ((r*299)+(g*587)+(b*114))/1000;
        return (yiq >= 128) ? '#000000' : '#ffffff';
    }

    document.getElementById('fProd').onchange = e => {
        const r = new FileReader();
        r.onload = () => { imgProd = new Image(); imgProd.onload = draw; imgProd.src = r.result; };
        r.readAsDataURL(e.target.files[0]);
    };

    function draw() {
        const nome = document.getElementById('pNome').value.toUpperCase();
        const preco = document.getElementById('pPreco').value;
        const extra = document.getElementById('pExtra').value;
        const cBg = document.getElementById('cBg').value;
        const cSelo = document.getElementById('cSelo').value;

        // Fundo
        ctx.fillStyle = cBg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Título
        ctx.textAlign = 'center';
        ctx.fillStyle = '#d32f2f';
        ctx.font = 'bold 200px Arial Black';
        ctx.fillText("OFERTA DO DIA", canvas.width/2, 400);

        // Imagem do Produto
        if(imgProd) {
            const pScale = Math.min(1800/imgProd.width, 1500/imgProd.height);
            const pw = imgProd.width * pScale;
            const ph = imgProd.height * pScale;
            ctx.drawImage(imgProd, (canvas.width - pw)/2, 650, pw, ph);
        }

        // Selo de Preço (Ajustado para ser um pouco menor)
        ctx.save();
        ctx.translate(canvas.width/2, 2650);
        ctx.rotate(-0.02); 

        ctx.fillStyle = cSelo;
        // Selo um pouco mais compacto
        const sW = 2000;
        const sH = 650;
        ctx.beginPath();
        ctx.roundRect(-sW/2, -sH/2, sW, sH, 50);
        ctx.fill();
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 10;
        ctx.stroke();

        const txtColor = getContrastColor(cSelo);
        ctx.fillStyle = txtColor;
        
        // Nome do Produto
        ctx.font = "bold 110px Arial";
        ctx.fillText(nome, 0, -150);

        // Preço (Tamanho reduzido de 650 para 520 para melhor equilíbrio)
        ctx.font = "bold 100px Arial";
        ctx.fillText("R$", -700, 150);
        
        ctx.font = "900 520px Arial Black";
        ctx.fillText(preco, 100, 230);
        ctx.restore();

        // Rodapé
        ctx.fillStyle = getContrastColor(cBg) === '#000000' ? '#444' : '#ccc';
        ctx.font = "70px Arial";
        ctx.fillText(extra, canvas.width/2, 3400);
    }

    function download() {
        const link = document.createElement('a');
        link.download = `OFERTA_A4_${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
    }

    window.onload = draw;
</script>
</body>
</html>
