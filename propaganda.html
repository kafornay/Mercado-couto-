<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado Couto | Pro Designer</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ff0000; --gold: #ffd700; }
        body { margin: 0; background: #111; color: white; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 350px; background: #1a1a1a; padding: 20px; border-right: 2px solid #333; overflow-y: auto; z-index: 10; }
        .sidebar h2 { font-size: 1.2rem; color: var(--gold); margin-bottom: 20px; text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .field { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; box-sizing: border-box; }
        input:focus { border-color: var(--gold); outline: none; }

        .btn { width: 100%; padding: 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: 0.3s; }
        .btn-save { background: var(--gold); color: #000; }
        .btn-pdf { background: #444; color: #fff; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }

        /* Preview Area */
        .preview { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; padding: 20px; }
        canvas { max-height: 95vh; max-width: 100%; box-shadow: 0 0 50px rgba(0,0,0,1); background: #fff; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>COUTO PRO DESIGN</h2>
    
    <div class="field">
        <label>Logo</label>
        <input type="file" id="fLogo" accept="image/*">
    </div>

    <div class="field">
        <label>Produto (PNG)</label>
        <input type="file" id="fProd" accept="image/*">
    </div>

    <div class="field">
        <label>Nome do Produto</label>
        <input type="text" id="pNome" value="Picanha Bovina KG" oninput="draw()">
    </div>

    <div class="field">
        <label>Preço</label>
        <input type="text" id="pPreco" value="59.90" oninput="draw()">
    </div>

    <div class="field">
        <label>Tema de Cor</label>
        <select id="pCor" onchange="draw()">
            <option value="#e31d1a">Vermelho Oferta</option>
            <option value="#2e7d32">Verde Hortifruti</option>
            <option value="#0d47a1">Azul Limpeza</option>
            <option value="#f57c00">Laranja Padaria</option>
        </select>
    </div>

    <div class="field">
        <label>Rodapé</label>
        <textarea id="pExtra" oninput="draw()">Oferta válida apenas para hoje.</textarea>
    </div>

    <button class="btn btn-save" onclick="downloadImage()">Baixar Imagem</button>
    <button class="btn btn-pdf" onclick="downloadPDF()">Gerar PDF</button>
</div>

<div class="preview">
    <canvas id="canvas" width="2480" height="3508"></canvas>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let imgLogo = null, imgProd = null;

    // Carregar arquivos
    document.getElementById('fLogo').onchange = e => loadFile(e, img => { imgLogo = img; draw(); });
    document.getElementById('fProd').onchange = e => loadFile(e, img => { imgProd = img; draw(); });

    function loadFile(e, cb) {
        const r = new FileReader();
        r.onload = () => { const i = new Image(); i.onload = () => cb(i); i.src = r.result; };
        if(e.target.files[0]) r.readAsDataURL(e.target.files[0]);
    }

    // Função para desenhar retângulos arredondados (Compatível com todos browsers)
    function roundedRect(ctx, x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
    }

    function draw() {
        const nome = document.getElementById('pNome').value.toUpperCase();
        const precoRaw = document.getElementById('pPreco').value.replace(',', '.');
        const cor = document.getElementById('pCor').value;
        const extra = document.getElementById('pExtra').value;

        // Limpar
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Fundo Gradiente
        const grd = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 500, canvas.width/2, canvas.height/2, 2500);
        grd.addColorStop(0, "#ffffff");
        grd.addColorStop(1, "#dcdcdc");
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Cabeçalho Curvado
        ctx.fillStyle = cor;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(canvas.width, 0);
        ctx.lineTo(canvas.width, 450);
        ctx.bezierCurveTo(canvas.width * 0.7, 600, canvas.width * 0.3, 300, 0, 500);
        ctx.fill();

        // Texto Oferta
        ctx.fillStyle = "white";
        ctx.textAlign = "center";
        ctx.font = "900 250px Montserrat, Arial Black";
        ctx.fillText("OFERTA DO DIA", canvas.width/2, 350);

        // Logo
        if (imgLogo) {
            const h = 300; const w = (imgLogo.width / imgLogo.height) * h;
            ctx.drawImage(imgLogo, 100, 50, w, h);
        }

        // Sombra do Produto
        if (imgProd) {
            ctx.beginPath();
            ctx.ellipse(canvas.width/2, 2150, 500, 80, 0, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(0,0,0,0.2)";
            ctx.fill();

            const pW = 1400; const pH = (imgProd.height / imgProd.width) * pW;
            ctx.drawImage(imgProd, (canvas.width - pW)/2, 2100 - pH, pW, pH);
        }

        // Nome do Produto
        ctx.fillStyle = "#111";
        ctx.font = "900 160px Montserrat, Arial Black";
        ctx.fillText(nome, canvas.width/2, 2350);

        // Badge de Preço
        ctx.save();
        ctx.translate(canvas.width/2, 2850);
        ctx.rotate(-0.03);
        ctx.fillStyle = cor;
        roundedRect(ctx, -700, -350, 1400, 600, 80);
        ctx.fill();

        // Texto Preço
        const partes = precoRaw.split('.');
        const reais = partes[0];
        const centavos = (partes[1] || '00').padEnd(2, '0').substring(0,2);

        ctx.fillStyle = "#fff";
        ctx.textAlign = "right";
        ctx.font = "900 150px Montserrat";
        ctx.fillText("R$", -380, 80);
        
        ctx.textAlign = "center";
        ctx.font = "900 650px Montserrat";
        ctx.fillText(reais, 0, 180);

        ctx.textAlign = "left";
        ctx.font = "900 280px Montserrat";
        ctx.fillText("," + centavos, 380, -100);
        ctx.restore();

        // Rodapé
        ctx.fillStyle = "#333";
        ctx.font = "bold 60px Arial";
        ctx.textAlign = "center";
        ctx.fillText(extra, canvas.width/2, 3450);
    }

    function downloadImage() {
        const link = document.createElement('a');
        link.download = 'oferta.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ format: 'a4' });
        const img = canvas.toDataURL('image/jpeg', 0.9);
        pdf.addImage(img, 'JPEG', 0, 0, 210, 297);
        pdf.save('oferta.pdf');
    }

    // Esperar fontes carregarem
    window.onload = () => { setTimeout(draw, 500); };
</script>

</body>
</html>
