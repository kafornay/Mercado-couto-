<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado Couto | Design de Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #ff0000; --gold: #ffd700; --dark-bg: #0f0f0f; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Roboto', sans-serif; background: var(--dark-bg); color: #eee; height: 100vh; overflow: hidden; }

        /* Interface de Software */
        .app-container { display: grid; grid-template-columns: 380px 1fr; height: 100vh; }
        
        .sidebar { 
            background: #1a1a1a; padding: 30px; border-right: 1px solid #333; 
            display: flex; flex-direction: column; gap: 20px; overflow-y: auto;
        }

        h1 { font-family: 'Montserrat', sans-serif; font-size: 18px; color: var(--gold); letter-spacing: 1px; margin-bottom: 10px; }

        .field-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 11px; text-transform: uppercase; color: #888; font-weight: 700; }
        
        input, textarea, select { 
            background: #252525; border: 1px solid #444; color: #fff; 
            padding: 12px; border-radius: 6px; font-size: 14px; transition: 0.3s;
        }
        input:focus { border-color: var(--gold); outline: none; background: #2d2d2d; }

        .btn-primary { 
            background: var(--gold); color: #000; border: none; padding: 15px; 
            border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase;
            margin-top: 10px; transition: 0.2s;
        }
        .btn-primary:hover { transform: scale(1.02); filter: brightness(1.1); }
        .btn-pdf { background: transparent; border: 1px solid #555; color: #fff; margin-top: 5px; }

        /* Preview Area */
        .preview-area { background: #0a0a0a; display: flex; align-items: center; justify-content: center; padding: 40px; overflow: hidden; }
        canvas { max-height: 90vh; width: auto; box-shadow: 0 50px 100px rgba(0,0,0,0.8); border-radius: 2px; }

        /* Custom File Input */
        .custom-file { 
            border: 1px dashed #555; padding: 10px; text-align: center; cursor: pointer; font-size: 12px; border-radius: 6px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <h1>COUTO DESIGNER <sup>PRO</sup></h1>
        
        <div class="field-group">
            <label>Logo da Empresa</label>
            <input type="file" id="fLogo" accept="image/*">
        </div>

        <div class="field-group">
            <label>Imagem do Produto (PNG sem fundo)</label>
            <input type="file" id="fProd" accept="image/*">
        </div>

        <div class="field-group">
            <label>Nome do Produto</label>
            <input id="pNome" value="VINHO TINTO RESERVA 750ML" oninput="draw()">
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div class="field-group">
                <label>Preço (0,00)</label>
                <input id="pPreco" value="49,90" oninput="draw()">
            </div>
            <div class="field-group">
                <label>Cor do Tema</label>
                <select id="pCor" onchange="draw()">
                    <option value="#d32f2f">OFERTA VERMELHA</option>
                    <option value="#1b5e20">HORTIFRUTI VERDE</option>
                    <option value="#0d47a1">LIMPEZA AZUL</option>
                    <option value="#ff6f00">PADARIA LARANJA</option>
                </select>
            </div>
        </div>

        <div class="field-group">
            <label>Informações Adicionais</label>
            <textarea id="pExtra" rows="2" oninput="draw()">Oferta exclusiva. Limitado a 6 unidades por cliente.</textarea>
        </div>

        <button class="btn-primary" onclick="downloadImage()">Exportar Imagem (PNG)</button>
        <button class="btn-primary btn-pdf" onclick="downloadPDF()">Gerar PDF A4</button>
    </div>

    <div class="preview-area">
        <canvas id="canvas" width="2480" height="3508"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let imgLogo = null, imgProd = null;

    // Carregar fontes antes de desenhar
    document.fonts.ready.then(() => draw());

    document.getElementById('fLogo').onchange = e => loadFile(e, img => { imgLogo = img; draw(); });
    document.getElementById('fProd').onchange = e => loadFile(e, img => { imgProd = img; draw(); });

    function loadFile(e, cb) {
        const r = new FileReader();
        r.onload = () => { const i = new Image(); i.onload = () => cb(i); i.src = r.result; };
        if(e.target.files[0]) r.readAsDataURL(e.target.files[0]);
    }

    function draw() {
        const nome = document.getElementById('pNome').value.toUpperCase();
        const precoRaw = document.getElementById('pPreco').value.replace(',', '.');
        const cor = document.getElementById('pCor').value;
        const extra = document.getElementById('pExtra').value;

        // 1. Fundo com Gradiente Radial (Efeito Estúdio)
        const grd = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 100, canvas.width/2, canvas.height/2, 2500);
        grd.addColorStop(0, '#ffffff');
        grd.addColorStop(1, '#e0e0e0');
        ctx.fillStyle = grd;
        ctx.fillRect(0,0, canvas.width, canvas.height);

        // 2. Faixa Diagonal de Topo
        ctx.save();
        ctx.fillStyle = cor;
        ctx.beginPath();
        ctx.moveTo(0,0); ctx.lineTo(canvas.width, 0); ctx.lineTo(canvas.width, 400); ctx.lineTo(0, 600);
        ctx.fill();
        ctx.restore();

        // 3. Título Principal
        ctx.textAlign = 'right';
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.font = '900 400px Montserrat';
        ctx.fillText("OFERTA", canvas.width - 50, 450);
        
        ctx.fillStyle = '#fff';
        ctx.font = '900 200px Montserrat';
        ctx.fillText("OFERTA ESPECIAL", canvas.width - 120, 350);

        // 4. Logo
        if(imgLogo) {
            const ratio = imgLogo.width / imgLogo.height;
            ctx.drawImage(imgLogo, 120, 100, 400 * ratio, 400);
        }

        // 5. Produto e Sombra de Contato
        if(imgProd) {
            const pW = 1500; const pH = (imgProd.height / imgProd.width) * pW;
            // Sombra oval no chão
            ctx.beginPath();
            ctx.ellipse(canvas.width/2, 2150, 600, 100, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,0,0,0.15)';
            ctx.fill();
            // Imagem
            ctx.drawImage(imgProd, (canvas.width - pW)/2, 2100 - pH, pW, pH);
        }

        // 6. Nome do Produto (Com Linha Decorativa)
        ctx.textAlign = 'center';
        ctx.fillStyle = '#111';
        ctx.font = '900 160px Montserrat';
        ctx.fillText(nome, canvas.width/2, 2350);
        ctx.fillRect(canvas.width/2 - 200, 2380, 400, 10);

        // 7. Splash de Preço (O "Selo" de Elite)
        const sX = canvas.width/2; const sY = 2850;
        ctx.save();
        ctx.translate(sX, sY);
        ctx.rotate(-0.05); // Leve inclinação para dar dinamismo
        
        // Sombra do Splash
        ctx.shadowColor = 'rgba(0,0,0,0.3)'; ctx.shadowBlur = 40;
        ctx.fillStyle = cor;
        ctx.beginPath();
        ctx.roundRect(-700, -350, 1400, 600, 100);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Textos do Preço
        const partes = precoRaw.split('.');
        const reais = partes[0];
        const centavos = (partes[1] || '00').padEnd(2, '0').substring(0,2);

        ctx.fillStyle = '#fff';
        ctx.textAlign = 'right';
        ctx.font = '900 150px Montserrat';
        ctx.fillText("R$", -380, 80);
        
        ctx.textAlign = 'center';
        ctx.font = '900 650px Montserrat';
        ctx.fillText(reais, 0, 180);

        ctx.textAlign = 'left';
        ctx.font = '900 250px Montserrat';
        ctx.fillText("," + centavos, 380, -100);
        ctx.restore();

        // 8. Rodapé Estilizado
        ctx.fillStyle = cor;
        ctx.fillRect(0, 3400, canvas.width, 108);
        ctx.fillStyle = '#fff';
        ctx.font = '700 60px Roboto';
        ctx.textAlign = 'center';
        ctx.fillText(extra, canvas.width/2, 3475);
    }

    // Funções de Download
    function downloadImage() {
        const link = document.createElement('a');
        link.download = `oferta_${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png', 1);
        link.click();
    }

    async function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
        const imgData = canvas.toDataURL("image/jpeg", 0.95);
        pdf.addImage(imgData, "JPEG", 0, 0, 210, 297);
        pdf.save("encarte_pro.pdf");
    }
</script>

</body>
</html>
