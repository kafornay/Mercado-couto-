<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Filtro Inteligente de Cotações</title>
<style>
body {
  font-family: Arial, sans-serif;
  background:#f2f2f2;
}
.container {
  max-width: 1000px;
  margin: 20px auto;
  background:#fff;
  padding:20px;
  border-radius:8px;
}
textarea {
  width:100%;
  height:140px;
}
button {
  padding:10px 15px;
  border:none;
  background:#007bff;
  color:#fff;
  border-radius:5px;
  cursor:pointer;
}
button:hover { background:#0056b3; }
.fornecedor {
  border:1px solid #ddd;
  margin-top:20px;
  padding:15px;
  border-radius:6px;
}
.fornecedor h3 { color:#007bff; }
li { margin-bottom:10px; }
.remover { background:#dc3545; }
.remover:hover { background:#b52a37; }
.marca-box {
  margin: 10px 0;
  padding:10px;
  background:#f8f9fa;
  border-radius:6px;
}
</style>
</head>

<body>
<div class="container">
<h2>Filtro Inteligente de Melhores Preços</h2>

<textarea id="cotacao" placeholder="Cole aqui as cotações..."></textarea><br><br>
<button onclick="adicionar()">Adicionar Cotação</button>
<button onclick="processar()">Filtrar Melhor Preço</button>

<div class="marca-box">
<strong>❌ Marcas indesejadas</strong><br>
<div id="marcas"></div>
</div>

<div id="resultado"></div>
</div>

<script>
let cotacoes = [];
let produtos = {};
let marcasBloqueadas = new Set();

function adicionar() {
  const txt = cotacao.value.trim();
  if(!txt) return;
  cotacoes.push(txt);
  cotacao.value = '';
  alert('Cotação adicionada');
}

function processar() {
  produtos = {};
  document.getElementById('resultado').innerHTML = '';
  marcasBloqueadas.clear();

  cotacoes.forEach(txt=>{
    const empresa = txt.match(/\*Empresa:\* (.+)/)?.[1] || 'Fornecedor';
    const itens = txt.split('📦').slice(1);

    itens.forEach(i=>{
      const nome = i.match(/\*(.+)\*/)?.[1]?.toLowerCase();
      const marca = i.match(/Marca:\s*(.+)/i)?.[1] || 'Sem marca';
      const valor = parseFloat(
        i.match(/R\$\s*([\d.,]+)/)?.[1].replace(/\./g,'').replace(',','.')
      );

      if(!nome) return;
      if(!produtos[nome]) produtos[nome]=[];
      produtos[nome].push({empresa,marca,valor,texto:i});
    });
  });

  renderMarcas();
  renderResultado();
}

function renderMarcas() {
  const box = document.getElementById('marcas');
  box.innerHTML = '';
  const marcas = new Set();

  Object.values(produtos).flat().forEach(p=>marcas.add(p.marca));

  marcas.forEach(m=>{
    const cb = document.createElement('input');
    cb.type='checkbox';
    cb.onchange=()=> {
      cb.checked ? marcasBloqueadas.add(m) : marcasBloqueadas.delete(m);
      renderResultado();
    };
    box.appendChild(cb);
    box.append(' '+m);
    box.appendChild(document.createElement('br'));
  });
}

function renderResultado() {
  const res = document.getElementById('resultado');
  res.innerHTML='';

  Object.entries(produtos).forEach(([produto,opcoes])=>{
    const validas = opcoes
      .filter(o=>!marcasBloqueadas.has(o.marca))
      .sort((a,b)=>a.valor-b.valor);

    if(validas.length===0) return;

    const melhor = validas[0];
    let div = document.querySelector(`[data-empresa="${melhor.empresa}"]`);
    if(!div){
      div=document.createElement('div');
      div.className='fornecedor';
      div.dataset.empresa=melhor.empresa;
      div.innerHTML=`<h3>${melhor.empresa}</h3><ul></ul>`;
      res.appendChild(div);
    }

    const li=document.createElement('li');
    li.innerHTML=`
      ${melhor.texto.replace(/\n/g,'<br>')}
      <br><button class="remover" onclick="remover('${produto}','${melhor.empresa}')">
      Remover / Trocar Marca
      </button>`;
    div.querySelector('ul').appendChild(li);
  });
}

function remover(produto,empresa){
  marcasBloqueadas.add(
    produtos[produto].find(p=>p.empresa===empresa)?.marca
  );
  renderResultado();
}
</script>
</body>
</html>
